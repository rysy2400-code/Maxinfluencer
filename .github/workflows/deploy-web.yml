# Web 部署：推送 main 且命中 web 相关路径时，通过 SSH 在 Web VM 上执行 deploy-web.ps1。
#
# 需要在 GitHub 仓库 Settings -> Secrets and variables -> Actions 中配置：
#   DEPLOY_SSH_KEY  用于连接 VM 的私钥全文（可复用同一把 key）
name: Deploy Web (Windows VM)

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "lib/**"
      - "next.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "deploy-web.ps1"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 152.32.185.48
          username: administrator
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File C:\maxinfluencer\deploy-web.ps1
